name: sync to seaweed-mono

# After every commit to main (and on a daily schedule as a backstop), open a
# PR against seaweedfs/seaweed-mono to pull the latest kmod source in via
# `git subtree pull`.  The PR is idempotent — if the subtree is already up to
# date, the script exits early and no PR is created.
#
# Requires: add a MONO_SYNC_TOKEN repository secret — a GitHub PAT (classic or
# fine-grained) with write access to seaweed-mono (Contents + Pull requests).
# The workflow skips silently when the secret is not yet configured.
on:
  push:
    branches: [main]
  schedule:
    # Daily at 04:00 UTC (after the nightly build-matrix run at 03:00)
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: read  # this repo — writes happen to seaweed-mono via the PAT

jobs:
  # Gate job: emit configured=true only when the secret is present.
  # Keeps the sync job from failing with an opaque "token required" error.
  check-token:
    runs-on: ubuntu-22.04
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - id: check
        env:
          TOKEN: ${{ secrets.MONO_SYNC_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "MONO_SYNC_TOKEN secret not set — skipping auto-sync." >> "$GITHUB_STEP_SUMMARY"
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

  sync:
    needs: check-token
    if: needs.check-token.outputs.configured == 'true'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout seaweed-mono
        uses: actions/checkout@v4
        with:
          repository: seaweedfs/seaweed-mono
          token: ${{ secrets.MONO_SYNC_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Pull kmod subtree
        id: pull
        run: |
          BRANCH="auto/sync-kmod-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"

          # Pull the latest from kmod into the subtree prefix.
          # --squash keeps mono history clean (one merge commit per sync).
          PREV_SHA=$(git rev-parse HEAD)
          git subtree pull \
            --prefix=seaweed-vfs/kernel \
            https://github.com/seaweedfs/seaweedvfs-kmod.git main \
            --squash \
            --message "seaweed-vfs/kernel: sync from seaweedvfs-kmod (auto)"

          # A no-op subtree pull creates no commit, so HEAD is unchanged. Compare
          # SHAs rather than git-diff (which would falsely fire if the tip commit
          # happened to touch seaweed-vfs/kernel/).
          if [ "$(git rev-parse HEAD)" = "$PREV_SHA" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true"  >> "$GITHUB_OUTPUT"
            echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          fi

      - name: Push branch and open PR
        if: steps.pull.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.MONO_SYNC_TOKEN }}
        run: |
          # Force-push: a same-day re-run reuses the date-based branch name, so
          # the remote branch may already exist from an earlier sync.
          git push origin "${{ steps.pull.outputs.branch }}" --force
          # Only open a PR if one isn't already open for this branch (idempotent).
          if ! gh pr list --repo seaweedfs/seaweed-mono \
                 --head "${{ steps.pull.outputs.branch }}" --state open | grep -q .; then
            gh pr create \
              --repo seaweedfs/seaweed-mono \
              --head "${{ steps.pull.outputs.branch }}" \
              --base main \
              --title "seaweed-vfs/kernel: sync from seaweedvfs-kmod" \
              --body "Automated subtree sync from [seaweedvfs-kmod](https://github.com/seaweedfs/seaweedvfs-kmod). Review the diff and merge when CI is green."
          fi
