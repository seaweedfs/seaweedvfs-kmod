# DKMS build recipe for the seaweedvfs kernel module.
#
# The module source (seaweedvfs.c, swvfs_proto.h, Makefile + this file) is
# installed to /usr/src/seaweedfs-vfs-<version>/ by the -dkms package. DKMS then
# rebuilds seaweedvfs.ko against the running kernel on install and on every
# kernel upgrade. The module is GPL, so shipping its source costs no IP — all the
# proprietary logic is in the closed-source userspace daemon (sw-kd).
#
# PACKAGE_VERSION must match SEAWEEDVFS_VERSION in seaweedvfs.c.
PACKAGE_NAME="seaweedfs-vfs"
PACKAGE_VERSION="0.0.9"

BUILT_MODULE_NAME[0]="seaweedvfs"
DEST_MODULE_LOCATION[0]="/updates/dkms"

# Reuse the in-tree out-of-tree Makefile (obj-m += seaweedvfs.o). DKMS runs these
# with cwd = the per-version build tree and exports $kernel_source_dir.
MAKE[0]="make KDIR=${kernel_source_dir}"
CLEAN="make KDIR=${kernel_source_dir} clean"

# Rebuild automatically when a new kernel is installed.
AUTOINSTALL="yes"
